name: "Bug Report"
description: "Segnala un problema riproducibile con BlenderAI"
title: "[Bug]: breve descrizione"
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Compila tutti i campi per aiutarci a riprodurre e correggere rapidamente il problema. Per problemi di sicurezza, non aprire issue pubbliche: usa i canali sicuri.
  - type: textarea
    id: summary
    attributes:
      label: "Descrizione"
      description: "Riassunto conciso del problema."
      placeholder: "Es. Crash su Analyze Scene con file .blend specifico"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: "Passi per riprodurre"
      description: "Elenco numerato dei passi minimi per riprodurre."
      placeholder: "1) Apri file ...\n2) Vai su ...\n3) Clicca ..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: "Comportamento atteso"
      description: "Cosa doveva succedere?"
      placeholder: "La scena viene analizzata senza errori e vengono mostrati i suggerimenti."
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: "Comportamento effettivo"
      description: "Cosa succede realmente, incluse schermate d'errore."
      placeholder: "Blender si chiude e mostra un traceback."
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: "Log / Traceback"
      description: "Incolla log, output console o allega file."
      render: bash
    validations:
      required: false
  - type: input
    id: environment
    attributes:
      label: "Ambiente"
      description: "Versioni e sistema."
      placeholder: "Blender 4.1, addon 2.3.0, Windows 11, RTX 3080, driver 555.85"
    validations:
      required: true
  - type: textarea
    id: attachments
    attributes:
      label: "File di test / asset"
      description: "Link o allegati minimi per riprodurre (.blend, asset, screenshot)."
    validations:
      required: false
